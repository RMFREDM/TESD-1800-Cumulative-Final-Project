<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="login.js" type="module"></script>
    <title>Log In</title>
</head>

<body>
    <header>
        <a href="/" id="homepage-link">Home</a>
        <a href="create_account.html" id="create-account-link">Create Account</a>
        <a href="login.html" id="login-link">Log In</a>
    </header>

    <p id="message" style="visibility: hidden;"></p>

    <form action="" name="login-form">
        <label for="email">Email</label>
        <input type="email" name="email" required>
        <label for="password">Password</label>
        <input type="password" name="password" required>
        <button type="submit">Log In</button>
        <a href="create_account.html">No account? Click here!</a>
    </form>
</body>

</html>
