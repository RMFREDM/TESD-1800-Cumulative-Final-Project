<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="index.js" type="module"></script>
    <title>Products</title>
</head>

<body>
    <header></header>

    <p id="message" style="visibility: hidden;"></p>

    <h1>Products</h1>

    <!-- list products -->
    <ul name="products-list">

    </ul>

    <!-- create a form for creating new products -->
    <form action="" method="post" name="create-product-form" style="visibility: hidden;">
        <label for="name">Product Name</label>
        <input type="text" name="name">
        <label for="Price">Product Price</label>
        <input type="number" step="0.01" min="0" name="price">
        <label for="inventory count">Inventory Count</label>
        <input type="number" min="0" name="inventory count">
        <label for="rating">Rating</label>
        <input type="number" min="0" max="5" name="rating">
        <button type="submit">Create Product</button>
    </form>

    <!-- create a button that makes the create-product-form-visible -->
    <button name="create-product-button">Create New Product</button>
</body>

</html>
